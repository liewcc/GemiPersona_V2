<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GemiPersona V2 - Utilities</title>
    <link rel="stylesheet" href="styles/main.css">
    <style>
        /* Local UI Styling for Tabs & Layouts */
        .tab-container {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 600;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid transparent;
        }
        .tab-btn:hover {
            color: var(--text-main);
            background-color: hsla(0, 0%, 100%, 0.04);
        }
        .tab-btn.active {
            color: var(--text-main);
            background-color: hsla(263, 80%, 65%, 0.15);
            border-color: var(--border-focus);
        }
        .tab-panel {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }
        .tab-panel.active {
            display: block;
        }
        .settings-grid-sub {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: rgba(0,0,0,0.15);
            padding: 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            margin-top: 10px;
        }
        .history-table-container {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: rgba(0,0,0,0.2);
            margin-top: 12px;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .history-table th, .history-table td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .history-table th {
            background: var(--bg-tertiary);
            font-weight: 600;
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
        }
        .history-table tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <div class="sidebar">
            <a href="setup.html" class="nav-item">
                ⚙️ Setup
            </a>
            <a href="utilities.html" class="nav-item active">
                🛠️ Utilities
            </a>
            <a href="account_health.html" class="nav-item">
                ❤️ Account Health
            </a>
            <a href="system_config.html" class="nav-item">
                ⚙️ System Config
            </a>
            <a href="#" class="nav-item" onclick="triggerOpenDownloadFolder(event)">
                📂 Open Download Folder
            </a>
        </div>

        <!-- Main Content -->
        <div class="main-content" style="height: 100vh; overflow: hidden; display: flex; flex-direction: column;">

            <!-- Tab 2: Asset Sanitizer -->
            <div id="panelSanitizer" class="tab-panel active flex-grow-1" style="height: calc(100vh - 220px); min-height: 0;">
                <div class="grid-2" style="height: 100%; grid-template-rows: 1fr; min-height: 0;">

                    <!-- Left Column: Controls (scrollable) -->
                    <div class="d-flex flex-column gap-15" style="overflow-y: auto; height: 100%; padding-right: 8px;">

                        <!-- Card 1: File Picker -->
                        <div class="card glass mb-0 p-20">
                            <div style="color: #a0a0ff; font-weight: 600; font-size: 0.85em; margin-bottom: 15px;">📂 SELECT IMAGE</div>
                            <div class="d-flex gap-8 align-center">
                                <input type="text" class="form-control" id="sanImagePath" placeholder="Enter image path or click 📁" list="sanPathHistory" style="flex: 1;">
                                <datalist id="sanPathHistory"></datalist>
                                <button class="btn" onclick="sanBrowseFile()" title="Browse">📁</button>
                                <button class="btn btn-primary" onclick="sanLoadImage()">OK</button>
                            </div>
                        </div>

                        <!-- Card 2: Metadata (hidden until image loaded) -->
                        <div class="card glass mb-0 p-20" id="sanMetaCard" style="display: none;">
                            <div style="color: #a0a0ff; font-weight: 600; font-size: 0.85em; margin-bottom: 15px;">🏷️ METADATA</div>
                            <div id="sanMetaContent"></div>
                        </div>

                    </div>

                    <!-- Right Column: Preview (no scroll) -->
                    <div class="d-flex flex-column h-100 gap-15" style="min-height: 0;">
                        <div class="card glass mb-0 p-20 d-flex flex-column" style="height: 100%; min-height: 0;">
                            <div style="color: #a0a0ff; font-weight: 600; font-size: 0.85em; margin-bottom: 15px;">🖼️ PREVIEW</div>
                            <div id="sanPreviewWrap" style="flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; overflow: hidden;">
                                <span class="text-muted" id="sanPreviewPlaceholder">No image selected.</span>
                                <img id="sanPreviewImg" style="display: none; max-width: 100%; max-height: 100%; object-fit: contain; border-radius: var(--radius-sm);">
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- Script Integrations -->
    <script src="js/api.js"></script>
    <script>
        // Electron open folders helper
        async function triggerOpenDownloadFolder(event) {
            if (event) event.preventDefault();
            try {
                const config = await api.getConfig();
                const saveDir = config.save_dir;
                if (saveDir) {
                    const result = await window.electronAPI.openFile(saveDir);
                    if (result) {
                        alert("Error opening download folder: " + result);
                    }
                } else {
                    alert("Download folder has not been configured in setup yet.");
                }
            } catch (err) {
                alert("Failed to fetch configuration: " + err.message);
            }
        }

        // ── Asset Sanitizer ───────────────────────────────────────────────────────────
        const SAN_HISTORY_KEY = 'sanPathHistory';
        const SAN_MAX_HISTORY = 10;

        function sanLoadHistory() {
            const list = JSON.parse(localStorage.getItem(SAN_HISTORY_KEY) || '[]');
            const datalist = document.getElementById('sanPathHistory');
            datalist.innerHTML = list.map(p => `<option value="${p}">`).join('');
        }

        function sanSavePath(p) {
            let list = JSON.parse(localStorage.getItem(SAN_HISTORY_KEY) || '[]');
            list = [p, ...list.filter(x => x !== p)].slice(0, SAN_MAX_HISTORY);
            localStorage.setItem(SAN_HISTORY_KEY, JSON.stringify(list));
            sanLoadHistory();
        }

        async function sanBrowseFile() {
            const paths = await window.electronAPI.selectFile({
                title: 'Select Image',
                filters: [{ name: 'Images', extensions: ['png', 'jpg', 'jpeg', 'webp'] }],
                properties: ['openFile']
            });
            if (paths && paths.length > 0) {
                document.getElementById('sanImagePath').value = paths[0];
                sanLoadImage();
            }
        }

        async function sanLoadImage() {
            const p = document.getElementById('sanImagePath').value.trim();
            if (!p) return;
            sanSavePath(p);
            localStorage.setItem('sanLastPath', p);

            // Preview
            const b64 = await window.electronAPI.readImageBase64(p);
            if (b64) {
                const ext = p.split('.').pop().toLowerCase();
                const mime = ext === 'png' ? 'image/png' : ext === 'jpg' || ext === 'jpeg' ? 'image/jpeg' : 'image/webp';
                document.getElementById('sanPreviewImg').src = b64.startsWith('data:') ? b64 : `data:${mime};base64,${b64}`;
                document.getElementById('sanPreviewImg').style.display = 'block';
                document.getElementById('sanPreviewPlaceholder').style.display = 'none';
            }

            // Metadata (PNG only)
            const ext = p.split('.').pop().toLowerCase();
            const metaCard = document.getElementById('sanMetaCard');
            const metaContent = document.getElementById('sanMetaContent');
            if (ext === 'png') {
                try {
                    const meta = await window.electronAPI.readPngMetadata(p);
                    if (meta && Object.keys(meta).length > 0) {
                        metaContent.innerHTML = Object.entries(meta).map(([k, v]) => `
                            <div style="margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
                                <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 4px;">${k}</div>
                                <div style="font-size: 13px; word-break: break-all; white-space: pre-wrap;">${v}</div>
                            </div>`).join('');
                    } else {
                        metaContent.innerHTML = '<span class="text-muted text-small">No text metadata found in this PNG.</span>';
                    }
                } catch (e) {
                    metaContent.innerHTML = `<span class="text-muted text-small">Error reading metadata: ${e.message}</span>`;
                }
                metaCard.style.display = 'block';
            } else {
                metaCard.style.display = 'none';
            }
        }

        // Init history on load, restore last image
        sanLoadHistory();
        const sanLastPath = localStorage.getItem('sanLastPath');
        if (sanLastPath) {
            document.getElementById('sanImagePath').value = sanLastPath;
            sanLoadImage();
        }
    </script>
</body>
</html>
