<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GemiPersona V2 - Account Health</title>
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .health-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
            min-height: 0;
            flex-grow: 1;
        }
        .chart-card {
            height: 350px;
            display: flex;
            flex-direction: column;
        }
        .chart-container {
            position: relative;
            flex-grow: 1;
            width: 100%;
            height: calc(100% - 30px);
        }
        .controls-card {
            padding: 16px;
            margin-bottom: 16px;
        }
        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .runs-card {
            flex-grow: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        .table-scroll {
            overflow-y: auto;
            flex-grow: 1;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: rgba(0, 0, 0, 0.2);
        }
        .health-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .health-table th, .health-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .health-table th {
            background: var(--bg-tertiary);
            font-weight: 600;
            color: var(--text-muted);
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .status-banner {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }
        .status-banner.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--danger);
            color: var(--danger);
            display: block;
        }
        .status-banner.success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--success);
            color: var(--success);
            display: block;
        }
        .d-flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-header {
            color: #a0a0ff;
            font-weight: 600;
            font-size: 0.85em;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .content-scroll-area {
            overflow-y: auto;
            height: calc(100vh - 40px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <div class="sidebar">
            <a href="setup.html" class="nav-item">
                ⚙️ Setup
            </a>
            <a href="profile_management.html" class="nav-item">
                👤 Profile Management
            </a>
            <a href="utilities.html" class="nav-item">
                🛠️ Utilities
            </a>
            <a href="account_health.html" class="nav-item active">
                ❤️ Account Health
            </a>
            <a href="system_config.html" class="nav-item">
                ⚙️ System Config
            </a>
            <a href="#" class="nav-item" onclick="triggerOpenDownloadFolder(event)">
                📂 Open Download Folder
            </a>
        </div>

        <!-- Main Content -->
        <div class="main-content" style="height: 100vh; overflow: hidden; display: flex; flex-direction: column;">
            <div class="content-scroll-area">
                <!-- Status Div -->
                <div id="statusBanner" class="status-banner"></div>

                <!-- Controls Card -->
                <div class="card glass controls-card">
                    <div class="controls-row d-flex-between">
                        <div class="d-flex gap-15 align-center flex-wrap">
                            <div class="control-group">
                                <label class="text-small text-muted" for="dateFrom">From:</label>
                                <input type="date" class="form-control" id="dateFrom">
                            </div>
                            <div class="control-group">
                                <label class="text-small text-muted" for="dateTo">To:</label>
                                <input type="date" class="form-control" id="dateTo">
                            </div>
                            <div class="control-group">
                                <label class="text-small text-muted" for="accountFilter">Account:</label>
                                <select class="form-control" id="accountFilter">
                                    <option value="">All accounts</option>
                                </select>
                            </div>
                            <button class="btn btn-primary" onclick="loadAllData()">Refresh</button>
                        </div>
                        <div class="d-flex gap-10 align-center">
                            <label class="text-small text-muted" for="clearDate">Older than:</label>
                            <input type="date" class="form-control" id="clearDate">
                            <button class="btn btn-danger" onclick="clearOldData()">Clear</button>
                        </div>
                    </div>
                </div>

                <!-- Charts Layout -->
                <div class="health-grid">
                    <!-- Chart 1: Grouped Bar Chart -->
                    <div class="card glass chart-card">
                        <div class="card-header">📊 Aggregates per Account</div>
                        <div class="chart-container">
                            <canvas id="barChart"></canvas>
                        </div>
                    </div>

                    <!-- Chart 2: Success Duration Line Chart -->
                    <div class="card glass chart-card">
                        <div class="card-header">📈 Success Cycle Durations</div>
                        <div class="chart-container">
                            <canvas id="lineChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Runs Card -->
                <div class="card glass runs-card">
                    <div class="card-header">🏃‍♂️ Recent Automation Runs</div>
                    <div class="table-scroll">
                        <table class="health-table">
                            <thead>
                                <tr>
                                    <th>Run ID</th>
                                    <th>Start Time</th>
                                    <th>End Time</th>
                                    <th>Accounts</th>
                                    <th>Successes</th>
                                    <th>Refusals</th>
                                    <th>Resets</th>
                                    <th>Quota Hits</th>
                                </tr>
                            </thead>
                            <tbody id="runsTableBody">
                                <tr>
                                    <td colspan="8" class="text-muted text-center" style="text-align: center; padding: 20px;">No runs recorded.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script Integrations -->
    <script src="js/chart.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        let barChartInstance = null;
        let lineChartInstance = null;

        // Electron open folders helper
        async function triggerOpenDownloadFolder(event) {
            if (event) event.preventDefault();
            try {
                const config = await window.electronAPI.readConfig();
                const saveDir = config.save_dir;
                if (saveDir) {
                    const result = await window.electronAPI.openFile(saveDir);
                    if (result) {
                        alert("Error opening download folder: " + result);
                    }
                } else {
                    alert("Download folder has not been configured in setup yet.");
                }
            } catch (err) {
                alert("Failed to fetch configuration: " + err.message);
            }
        }

        // Initialize dates
        function initDateInputs() {
            const today = new Date();
            
            // Format YYYY-MM-DD helper using local time
            const formatLocalDate = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            const dateToVal = formatLocalDate(today);
            
            const sixDaysAgo = new Date();
            sixDaysAgo.setDate(today.getDate() - 6);
            const dateFromVal = formatLocalDate(sixDaysAgo);

            document.getElementById('dateTo').value = dateToVal;
            document.getElementById('dateFrom').value = dateFromVal;
            
            // Clear date defaults to 30 days ago
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(today.getDate() - 30);
            document.getElementById('clearDate').value = formatLocalDate(thirtyDaysAgo);
        }

        // Display status helper
        function showStatus(msg, type = 'error') {
            const banner = document.getElementById('statusBanner');
            banner.textContent = msg;
            banner.className = 'status-banner ' + type;
        }

        function clearStatus() {
            const banner = document.getElementById('statusBanner');
            banner.style.display = 'none';
        }

        // Populate account filter select list dynamically
        function updateAccountFilter(summaryData) {
            const select = document.getElementById('accountFilter');
            const currentVal = select.value;
            
            // Re-build select
            select.innerHTML = '<option value="">All accounts</option>';
            
            const accounts = new Set();
            if (Array.isArray(summaryData)) {
                summaryData.forEach(row => {
                    if (row.grp) {
                        accounts.add(row.grp);
                    }
                });
            }
            
            Array.from(accounts).sort().forEach(acc => {
                const opt = document.createElement('option');
                opt.value = acc;
                opt.textContent = acc;
                if (acc === currentVal) {
                    opt.selected = true;
                }
                select.appendChild(opt);
            });
        }

        // Main data loading function
        async function loadAllData() {
            clearStatus();
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;
            const account = document.getElementById('accountFilter').value;

            try {
                // 1. Fetch Aggregates/Summary for Chart 1 and Account Filter
                const summaryResp = await api.getHealthSummary({ date_from: dateFrom, date_to: dateTo, group_by: 'account' });
                const summaryData = summaryResp.summary || [];
                updateAccountFilter(summaryData);
                renderBarChart(summaryData);

                // 2. Fetch Events for Line Chart
                const eventsParams = { date_from: dateFrom, date_to: dateTo, limit: 2000 };
                if (account) {
                    eventsParams.account = account;
                }
                const eventsResp = await api.getHealthEvents(eventsParams);
                const eventsData = eventsResp.events || [];
                renderLineChart(eventsData);

                // 3. Fetch Runs Table
                const runsResp = await api.getHealthRuns(50);
                const runsData = runsResp.runs || [];
                renderRunsTable(runsData);

            } catch (err) {
                showStatus("Failed to load health statistics: " + err.message, 'error');
            }
        }

        // Render Grouped Bar Chart
        function renderBarChart(data) {
            if (barChartInstance) {
                barChartInstance.destroy();
            }

            const ctx = document.getElementById('barChart').getContext('2d');
            
            const labels = data.map(r => r.grp || 'Unknown');
            const successes = data.map(r => r.successes || 0);
            const refusals = data.map(r => r.refusals || 0);
            const resets = data.map(r => r.resets || 0);
            const quotaHits = data.map(r => r.quota_hits || 0);

            barChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Successes', data: successes, backgroundColor: 'rgba(16, 185, 129, 0.75)', borderColor: 'rgb(16, 185, 129)', borderWidth: 1 },
                        { label: 'Refusals', data: refusals, backgroundColor: 'rgba(245, 158, 11, 0.75)', borderColor: 'rgb(245, 158, 11)', borderWidth: 1 },
                        { label: 'Resets', data: resets, backgroundColor: 'rgba(239, 68, 68, 0.75)', borderColor: 'rgb(239, 68, 68)', borderWidth: 1 },
                        { label: 'Quota Hits', data: quotaHits, backgroundColor: 'rgba(139, 92, 246, 0.75)', borderColor: 'rgb(139, 92, 246)', borderWidth: 1 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: 'hsl(210, 40%, 96%)', font: { family: 'Google Sans, sans-serif' } } }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: 'hsl(215, 20%, 65%)', font: { family: 'Google Sans, sans-serif' } }
                        },
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: 'hsl(215, 20%, 65%)', font: { family: 'Google Sans, sans-serif' }, precision: 0 }
                        }
                    }
                }
            });
        }

        // Render Success Durations Line Chart
        function renderLineChart(events) {
            if (lineChartInstance) {
                lineChartInstance.destroy();
            }

            const ctx = document.getElementById('lineChart').getContext('2d');

            // Filter for event_type === 'success' and sort events oldest to newest (since query returns newest first)
            const successEvents = events
                .filter(e => e.event_type === 'success')
                .reverse();

            const labels = successEvents.map(e => {
                const d = new Date(e.ts * 1000);
                return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + ' (' + d.toLocaleDateString([], { month: 'numeric', day: 'numeric' }) + ')';
            });
            const dataPoints = successEvents.map(e => e.duration_sec || 0);

            lineChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Duration (sec)',
                        data: dataPoints,
                        borderColor: 'rgb(99, 102, 241)',
                        backgroundColor: 'rgba(99, 102, 241, 0.15)',
                        borderWidth: 2,
                        tension: 0.2,
                        fill: true,
                        pointRadius: 3,
                        pointHoverRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: 'hsl(210, 40%, 96%)', font: { family: 'Google Sans, sans-serif' } } }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: 'hsl(215, 20%, 65%)', font: { family: 'Google Sans, sans-serif' } }
                        },
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: 'hsl(215, 20%, 65%)', font: { family: 'Google Sans, sans-serif' } }
                        }
                    }
                }
            });
        }

        // Render Runs Table
        function renderRunsTable(runs) {
            const tbody = document.getElementById('runsTableBody');
            if (runs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-muted text-center" style="text-align: center; padding: 20px;">No runs recorded.</td></tr>';
                return;
            }

            tbody.innerHTML = runs.map(run => {
                const startStr = run.start_ts ? new Date(run.start_ts * 1000).toLocaleString() : 'N/A';
                const endStr = run.end_ts ? new Date(run.end_ts * 1000).toLocaleString() : 'N/A';
                return `
                    <tr>
                        <td style="font-family: var(--font-mono); font-size: 12px; color: #a0a0ff;">${run.run_id}</td>
                        <td>${startStr}</td>
                        <td>${endStr}</td>
                        <td>${run.accounts || 0}</td>
                        <td style="color: var(--success); font-weight: 500;">${run.successes || 0}</td>
                        <td style="color: var(--warning);">${run.refusals || 0}</td>
                        <td style="color: var(--danger);">${run.resets || 0}</td>
                        <td style="color: hsl(263, 80%, 65%);">${run.quota_hits || 0}</td>
                    </tr>
                `;
            }).join('');
        }

        // Clear health database entries helper
        async function clearOldData() {
            clearStatus();
            const clearDate = document.getElementById('clearDate').value;
            if (!clearDate) {
                alert("Please select a valid date.");
                return;
            }

            if (!confirm(`Are you sure you want to permanently delete all health events recorded prior to ${clearDate}?`)) {
                return;
            }

            try {
                const res = await api.clearHealthBefore(clearDate);
                const count = res.deleted || 0;
                showStatus(`Successfully cleared ${count} old events.`, 'success');
                loadAllData();
            } catch (err) {
                showStatus("Failed to clear old data: " + err.message, 'error');
            }
        }

        // Run on page load
        document.addEventListener('DOMContentLoaded', () => {
            initDateInputs();
            loadAllData();
        });
    </script>
</body>
</html>
